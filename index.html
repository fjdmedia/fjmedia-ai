<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FJMedia AI — Lead Bot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0b1120;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .chat-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    height: 90vh;
    max-height: 700px;
    background: #111827;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.08);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
  }

  .chat-header {
    padding: 20px 24px;
    background: #0b1120;
    border-bottom: 1px solid rgba(255,255,255,.06);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .chat-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9a84c, #e8c96d);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: #0b1120;
    flex-shrink: 0;
  }

  .chat-header-info h3 {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }

  .chat-header-info p {
    color: #6b7280;
    font-size: 12px;
    margin-top: 2px;
  }

  .online-dot {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 85%;
    animation: msgIn .25s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9a84c, #e8c96d);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #0b1120;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-bubble {
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
  }

  .msg.bot .msg-bubble {
    background: #1e293b;
    color: #e2e8f0;
    border-bottom-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #c9a84c, #e8c96d);
    color: #0b1120;
    font-weight: 500;
    border-bottom-right-radius: 4px;
  }

  .typing {
    display: flex;
    gap: 8px;
    align-self: flex-start;
    max-width: 85%;
  }

  .typing-bubble {
    background: #1e293b;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: #6b7280;
    border-radius: 50%;
    animation: typing-bounce .8s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }

  @keyframes typing-bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  .chat-input-area {
    padding: 16px;
    border-top: 1px solid rgba(255,255,255,.06);
    display: flex;
    gap: 10px;
    background: #0b1120;
  }

  .chat-input {
    flex: 1;
    background: #1e293b;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 12px 16px;
    color: #e2e8f0;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
    resize: none;
    line-height: 1.4;
    max-height: 100px;
  }

  .chat-input:focus { border-color: rgba(201,168,76,.4); }
  .chat-input::placeholder { color: #4b5563; }

  .chat-send {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #c9a84c, #e8c96d);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s, transform .15s;
    align-self: flex-end;
  }

  .chat-send:hover { opacity: .88; transform: scale(1.05); }
  .chat-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .chat-send svg { width: 18px; height: 18px; fill: #0b1120; }

  .powered-by {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: #374151;
    background: #0b1120;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="chat-avatar">FJ</div>
    <div class="chat-header-info">
      <h3>FJMedia AI</h3>
      <p><span class="online-dot"></span>Online now</p>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-area">
    <textarea
      class="chat-input"
      id="chatInput"
      placeholder="Type your message..."
      rows="1"
    ></textarea>
    <button class="chat-send" id="sendBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="powered-by">Powered by FJMedia AI</div>
</div>

<script>
  // --- CONFIG ---
  // When deployed to Vercel, this auto-resolves to your serverless function.
  // For local testing, point to your deployed Vercel URL: 'https://your-project.vercel.app/api/chat'
  const API_URL = '/api/chat';

  const messagesEl = document.getElementById('chatMessages');
  const inputEl = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');

  let conversationHistory = [];
  let isLoading = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, text) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    if (role === 'bot') {
      msg.innerHTML = `
        <div class="msg-avatar">FJ</div>
        <div class="msg-bubble">${text}</div>
      `;
    } else {
      msg.innerHTML = `<div class="msg-bubble">${text}</div>`;
    }

    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typingIndicator';
    t.innerHTML = `
      <div class="msg-avatar">FJ</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    messagesEl.appendChild(t);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);

    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await res.json();
      hideTyping();

      if (data.reply) {
        conversationHistory.push({ role: 'assistant', content: data.reply });
        addMessage('bot', data.reply);
      } else {
        addMessage('bot', 'Sorry, something went wrong. Try again in a moment.');
      }
    } catch (err) {
      hideTyping();
      addMessage('bot', 'Connection issue. Please try again.');
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  // Opening message
  window.addEventListener('load', () => {
    setTimeout(() => {
      const greeting = "Hey! I'm FJ, your guide to working with FJMedia. What kind of business do you run?";
      conversationHistory.push({ role: 'assistant', content: greeting });
      addMessage('bot', greeting);
    }, 600);
  });
</script>
</body>
</html>
